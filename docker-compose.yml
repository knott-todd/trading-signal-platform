version: "3.9"

services:
  db:
    image: timescale/timescaledb-ha:pg18
    restart: unless-stopped
    environment:
      POSTGRES_USER: perception
      POSTGRES_PASSWORD: perception
      POSTGRES_DB: perception
    volumes:
      - timescale_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U perception -d perception"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./services/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://perception:perception@db:5432/perception
    ports:
      - "8000:8000"
    volumes:
      - ./services/backend:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 20s

  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      INGESTION_API_URL: http://backend:8000
      GATEWAY_PORT: 8080
      SSE_KEEPALIVE_SECONDS: 30
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 15s

  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
      args:
        VITE_GATEWAY_URL: ""
    restart: unless-stopped
    depends_on:
      gateway:
        condition: service_healthy
    ports:
      - "8090:80"

volumes:
  timescale_data:
